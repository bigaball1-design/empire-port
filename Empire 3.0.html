<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire Port 3.0 Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #070707; --card: #111; --text: #eee; --dim: #888; 
            --up: #00ff88; --down: #ff3344; --accent: #222; --warn: #ffab40; --tv-blue: #2962ff;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 15px; }
        
        /* Pulse Animation */
        @keyframes pulse-border {
            0% { border-color: var(--accent); box-shadow: 0 0 0px rgba(255,171,64,0); }
            50% { border-color: var(--warn); box-shadow: 0 0 15px rgba(255,171,64,0.3); }
            100% { border-color: var(--accent); box-shadow: 0 0 0px rgba(255,171,64,0); }
        }

        nav { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--accent); padding-bottom: 10px; }
        .nav-btn { background: none; border: 1px solid var(--accent); color: var(--dim); padding: 8px 16px; cursor: pointer; font-family: 'JetBrains Mono'; font-size: 0.8rem; border-radius: 4px; transition: 0.3s; }
        .nav-btn.active { border-color: var(--up); color: var(--up); background: rgba(0, 255, 136, 0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h1 { font-family: 'JetBrains Mono'; font-size: 1.4rem; color: var(--up); margin: 0; }
        
        .summary-bar { background: var(--card); border: 1px solid var(--accent); padding: 20px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; border-radius: 10px; }
        .summary-item span { display: block; font-size: 0.7rem; color: var(--dim); margin-bottom: 4px; text-transform: uppercase; }
        .summary-item b { font-family: 'JetBrains Mono'; font-size: 1.3rem; }
        
        .charts-wrapper { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; margin-bottom: 25px; }
        .chart-box { background: var(--card); border: 1px solid var(--accent); padding: 20px; border-radius: 10px; height: 350px; }
        
        /* Portfolio List */
        .list-header, .stock-row { display: grid; grid-template-columns: 1.2fr 0.8fr 0.8fr 0.8fr 1fr 1fr 1.2fr; gap: 10px; align-items: center; }
        .list-header { padding: 0 15px 12px; color: var(--dim); font-size: 0.65rem; text-transform: uppercase; font-weight: 700; }
        .stock-row { background: var(--card); border: 1px solid var(--accent); margin-bottom: 10px; padding: 18px 15px; border-radius: 8px; font-size: 1rem; }
        
        /* Watchlist Grid */
        .watch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .watch-card { background: var(--card); border: 1px solid var(--accent); padding: 20px; border-radius: 10px; transition: 0.3s; position: relative; }
        .watch-card.alert-pulse { animation: pulse-border 2s infinite; border-width: 1.5px; }
        .watch-card.buy-zone { border: 2px solid var(--up); background: rgba(0,255,136,0.05); }
        
        .tv-btn { display: block; width: 100%; text-align: center; background: var(--tv-blue); color: #fff; text-decoration: none; padding: 10px 0; border-radius: 6px; margin-top: 15px; font-size: 0.75rem; font-weight: 600; font-family: 'JetBrains Mono'; }
        .up { color: var(--up) !important; } .down { color: var(--down) !important; } .warn { color: var(--warn) !important; }
        .bar-bg { height: 6px; background: #222; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--up); width: 0%; transition: 1.2s; }

        @media (max-width: 900px) { .charts-wrapper { grid-template-columns: 1fr; } .list-header { display: none; } .stock-row { grid-template-columns: 1.2fr 1fr; gap: 15px; } }
    </style>
</head>
<body>

    <header><h1>EMPIRE_PORT_3.0</h1><div id="sync-info" style="font-size: 0.6rem; color: var(--dim);">READY</div></header>

    <nav>
        <button class="nav-btn active" onclick="switchTab('port', this)">MAIN_PORT</button>
        <button class="nav-btn" onclick="switchTab('watch', this)">ALPHA_WATCHLIST</button>
    </nav>

    <div id="tab-port" class="tab-content active">
        <div class="summary-bar">
            <div class="summary-item"><span>Net Worth (USD)</span><b id="total-usd">$0</b></div>
            <div class="summary-item"><span>Net Worth (THB)</span><b id="total-thb">฿0</b></div>
            <div class="summary-item"><span>Unrealized P/L</span><b id="total-pl">0.00%</b></div>
            <div class="summary-item"><span>USD/THB</span><b id="fx-rate">0.00</b></div>
        </div>
        <div class="charts-wrapper">
            <div class="chart-box"><div style="font-size:0.75rem; color:var(--dim); margin-bottom:10px">// ALLOCATION</div><canvas id="pieChart"></canvas></div>
            <div class="chart-box"><div style="font-size:0.75rem; color:var(--dim); margin-bottom:10px">// GROWTH_HISTORY</div><canvas id="growthChart"></canvas></div>
        </div>
        <div class="list-header"><div>Asset</div><div>Shares</div><div>Avg Cost</div><div>Price</div><div>Value</div><div>P/L</div><div>Target</div></div>
        <div id="stock-list"></div>
    </div>

    <div id="tab-watch" class="tab-content">
        <div style="font-size: 0.8rem; color: var(--up); font-family: 'JetBrains Mono'; margin-bottom: 20px;">// SORTED_BY_ENTRY_PROXIMITY...</div>
        <div id="watch-grid" class="watch-grid"></div>
    </div>

<script>
    const PORT_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQxEdO_NiXSTfy_96k0yL4rm-i9Ap3PwsIAzm4D3UlUVuntBqanNjChBCfB-ylKgWvYYI6kxIThfk-/pub?gid=1701656193&single=true&output=csv';
    const WATCH_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQxEdO_NiXSTfy_96k0yL4rm-i9Ap3PwsIAzm4D3UlUVuntBqanNjChBCfB-ylKgWvYYI6kxIThfk-/pub?gid=2092358580&single=true&output=csv';
    const HIST_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQxEdO_NiXSTfy_96k0yL4rm-i9Ap3PwsIAzm4D3UlUVuntBqanNjChBCfB-ylKgWvYYI6kxIThfk-/pub?gid=292797368&single=true&output=csv';
    
    let LIVE_FX = 36.50, myGChart = null, myPChart = null;

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        btn.classList.add('active');
    }

    function clean(v) { if(!v || v=="#N/A") return 0; return parseFloat(v.toString().replace(/[^0-9.-]+/g, "")) || 0; }

    async function update() {
        try {
            const fx = await fetch('https://open.er-api.com/v6/latest/USD').then(r => r.json());
            LIVE_FX = fx.rates.THB;
            const [pText, wText, hText] = await Promise.all([
                fetch(PORT_CSV).then(r => r.text()),
                fetch(WATCH_CSV).then(r => r.text()),
                fetch(HIST_CSV).then(r => r.text())
            ]);
            const hRows = hText.split('\n').slice(1).map(r => r.split(',')).filter(r => r[0]);
            renderPort(pText.split('\n').slice(1).map(r => r.split(',')).filter(r => r[0] && clean(r[5]) > 0), hRows);
            renderWatch(wText.split('\n').slice(1).map(r => r.split(',')).filter(r => r[0]));
            document.getElementById('sync-info').innerText = `SYNC: ${new Date().toLocaleTimeString()}`;
        } catch (e) { document.getElementById('sync-info').innerText = "ERROR"; }
    }

    function renderPort(rows, hRows) {
        const container = document.getElementById('stock-list'); container.innerHTML = '';
        let tMkt = 0, tCost = 0, tTarget = 0, tickers = [], values = [];
        rows.forEach(cols => {
            const ticker = cols[0].trim(), price = clean(cols[2]), cost = clean(cols[4]), shares = clean(cols[5]), target = clean(cols[7]);
            const mktVal = price * shares, costBasis = cost * shares, plUsd = mktVal - costBasis, plPct = costBasis > 0 ? (plUsd/costBasis)*100 : 0;
            const progress = target > 0 ? Math.min((price/target)*100, 100) : 0;
            tMkt += mktVal; tCost += costBasis; tTarget += (target * shares); tickers.push(ticker); values.push(mktVal);
            container.innerHTML += `<div class="stock-row"><div style="font-family:'JetBrains Mono'"><b class="up">${ticker}</b><br><i style="font-size:0.7rem;color:var(--dim)">${cols[1]}</i></div><div style="font-family:'JetBrains Mono'"><b>${shares}</b><br><i style="font-size:0.7rem;color:var(--dim)">shares</i></div><div>$${cost.toFixed(2)}</div><div>$${price.toFixed(2)}</div><div class="white">$${mktVal.toLocaleString()}</div><div class="${plUsd>=0?'up':'down'}">${plPct.toFixed(1)}%</div><div><div style="display:flex;justify-content:space-between;font-size:0.6rem"><span>TGT $${target}</span><span>${progress.toFixed(0)}%</span></div><div class="bar-bg"><div class="bar-fill" style="width:${progress}%"></div></div></div></div>`;
        });
        document.getElementById('total-usd').innerText = `$${tMkt.toLocaleString(undefined,{maximumFractionDigits:0})}`;
        document.getElementById('total-thb').innerText = `฿${(tMkt*LIVE_FX).toLocaleString(undefined,{maximumFractionDigits:0})}`;
        const totalPlPct = tCost > 0 ? ((tMkt-tCost)/tCost)*100 : 0;
        document.getElementById('total-pl').innerText = `${totalPlPct.toFixed(2)}%`;
        document.getElementById('total-pl').className = totalPlPct >= 0 ? 'up' : 'down';
        document.getElementById('fx-rate').innerText = LIVE_FX.toFixed(2);
        drawCharts(tMkt, tTarget, tickers, values, hRows);
    }

    function renderWatch(rows) {
        const grid = document.getElementById('watch-grid'); grid.innerHTML = '';
        const sorted = rows.map(cols => {
            const price = clean(cols[4]), target = clean(cols[5]);
            return { cols, gap: ((price - target) / target * 100) };
        }).sort((a, b) => a.gap - b.gap); // Sorting: ต่ำสุดขึ้นก่อน

        sorted.forEach(item => {
            const { cols, gap } = item;
            const ticker = cols[0], exchange = cols[1], price = clean(cols[4]), target = clean(cols[5]);
            let cardClass = 'watch-card';
            let badgeText = `GAP: ${gap.toFixed(1)}%`;
            let badgeClass = 'warn';

            if (gap <= 0) { cardClass += ' buy-zone'; badgeText = 'READY FOR ENTRY'; badgeClass = 'up'; }
            else if (gap <= 5) { cardClass += ' alert-pulse'; badgeText = `NEARBY: ${gap.toFixed(1)}%`; }

            grid.innerHTML += `<div class="${cardClass}"><div style="font-family:'JetBrains Mono';font-size:1.5rem">${ticker} <span style="font-size:0.7rem;color:var(--dim)">${exchange}</span></div><div style="font-size:0.8rem;color:var(--dim);margin:10px 0">${cols[3]}</div><div style="display:flex;justify-content:space-between;border-top:1px solid #222;padding-top:10px"><div><span style="font-size:0.7rem;color:var(--dim)">Current</span><br><b>$${price.toFixed(2)}</b></div><div style="text-align:right"><span style="font-size:0.7rem;color:var(--dim)">Target</span><br><b class="up">$${target.toFixed(2)}</b></div></div><div class="gap-badge ${badgeClass}" style="margin-top:10px">${badgeText}</div><div style="font-size:0.7rem;color:var(--dim);margin-top:10px;border-top:1px dashed #222;padding-top:10px">${cols[6]||'-'}</div><a href="https://www.tradingview.com/chart/?symbol=${exchange}:${ticker}" target="_blank" class="tv-btn">VIEW CHART</a></div>`;
        });
    }

    function drawCharts(current, target, tickers, values, hRows) {
        const labels = hRows.map(r => r[0]); labels.push('Now');
        const data = hRows.map(r => clean(r[1])); data.push(current);
        if (myGChart) myGChart.destroy();
        myGChart = new Chart(document.getElementById('growthChart'), {
            type: 'line',
            data: { labels, datasets: [
                { data: Array(labels.length).fill(target), borderColor: '#00ff88', borderDash: [5,5], pointRadius: 0, fill: false },
                { data, borderColor: '#00ff88', backgroundColor: 'rgba(0,255,136,0.1)', fill: true, pointRadius: 5, tension: 0.3 }
            ]},
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#222' }, ticks: { color: '#aaa' } }, x: { ticks: { color: '#666', font: { size: 10 } } } } }
        });
        if (myPChart) myPChart.destroy();
        myPChart = new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: { labels: tickers.map((t, i) => `${t} (${((values[i]/values.reduce((a,b)=>a+b,0))*100).toFixed(1)}%)`),
            datasets: [{ data: values, backgroundColor: ['#FFADAD', '#FFD6A5', '#FDFFB6', '#CAFFBF', '#9BF6FF', '#A0C4FF', '#BDB2FF', '#FFC6FF'], borderWidth: 0 }]},
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#aaa', font: { size: 10 } } } }, cutout: '70%' }
        });
    }
    update(); setInterval(update, 60000);
</script>
</body>
</html>
