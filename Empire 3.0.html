<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire Port 3.0 Immortal Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #070707; --card: #111; --text: #eee; --dim: #888; --up: #00ff88; --down: #ff3344; --accent: #222; --warn: #ffab40; --tv-blue: #2962ff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        nav { display: flex; gap: 15px; margin-bottom: 25px; border-bottom: 2px solid var(--accent); padding-bottom: 15px; }
        .nav-btn { background: none; border: 1px solid var(--accent); color: var(--dim); padding: 10px 20px; cursor: pointer; font-family: 'JetBrains Mono'; border-radius: 4px; }
        .nav-btn.active { border-color: var(--up); color: var(--up); background: rgba(0, 255, 136, 0.1); font-weight: 700; }
        .tab-content { display: none; } .tab-content.active { display: block; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-family: 'JetBrains Mono'; font-size: 1.8rem; color: var(--up); margin: 0; }
        .summary-bar { background: var(--card); border: 1px solid var(--accent); padding: 25px; margin-bottom: 25px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 25px; border-radius: 12px; }
        .summary-item span { display: block; font-size: 0.8rem; color: var(--dim); margin-bottom: 8px; text-transform: uppercase; }
        .summary-item b { font-family: 'JetBrains Mono'; font-size: 1.8rem; }
        .charts-wrapper { display: grid; grid-template-columns: 1fr 1.5fr; gap: 25px; margin-bottom: 30px; }
        .chart-box { background: var(--card); border: 1px solid var(--accent); padding: 25px; border-radius: 12px; height: 380px; }
        .list-header, .stock-row { display: grid; grid-template-columns: 1.3fr 0.7fr 0.7fr 0.8fr 1.2fr 1.1fr 0.7fr 1.2fr; gap: 12px; align-items: center; }
        .list-header { padding: 0 20px 10px; color: var(--dim); font-size: 0.65rem; text-transform: uppercase; font-weight: 800; }
        .stock-row { background: var(--card); border: 1px solid var(--accent); margin-bottom: 10px; padding: 18px 20px; border-radius: 8px; font-size: 0.95rem; }
        .watch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .watch-card { background: var(--card); border: 1px solid var(--accent); padding: 25px; border-radius: 12px; }
        .tv-btn { display: block; width: 100%; text-align: center; background: var(--tv-blue); color: white; text-decoration: none; padding: 12px 0; border-radius: 8px; margin-top: 20px; font-size: 0.85rem; font-weight: 700; }
        .up { color: var(--up) !important; } .down { color: var(--down) !important; } .warn { color: var(--warn) !important; } .white { color: #ffffff !important; }
    </style>
</head>
<body>
    <header><h1>EMPIRE_PORT_3.0</h1><div id="sync-info" style="font-size: 0.7rem; color: var(--dim);">BOOTING...</div></header>
    <nav>
        <button class="nav-btn active" onclick="switchTab('port', this)">MAIN_PORTFOLIO</button>
        <button class="nav-btn" onclick="switchTab('watch', this)">ALPHA_WATCHLIST</button>
    </nav>

    <div id="tab-port" class="tab-content active">
        <div class="summary-bar">
            <div class="summary-item"><span>Net Worth (USD)</span><b id="total-usd" class="up">$0</b></div>
            <div class="summary-item"><span>Net Worth (THB)</span><b id="total-thb">฿0</b></div>
            <div class="summary-item"><span>Portfolio P/L (%)</span><b id="total-pl">0.00%</b></div>
            <div class="summary-item"><span>USD/THB (K2)</span><b id="fx-rate" style="color:var(--dim)">0.00</b></div>
        </div>
        <div class="charts-wrapper">
            <div class="chart-box"><canvas id="pieChart"></canvas></div>
            <div class="chart-box"><canvas id="growthChart"></canvas></div>
        </div>
        <div id="cash-list"></div>
        <div class="list-header" style="margin-top:20px"><div>Asset</div><div>Shares</div><div>Avg Cost</div><div>Price</div><div>Value</div><div>P/L (USD)</div><div>P/L (%)</div><div>Target</div></div>
        <div id="stock-list"></div>
    </div>

    <div id="tab-watch" class="tab-content">
        <div id="watch-grid" class="watch-grid"></div>
    </div>

<script>
    const PORT_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQxEdO_NiXSTfy_96k0yL4rm-i9Ap3PwsIAzm4D3UlUVuntBqanNjChBCfB-ylKgWvYYI6kxIThfk-/pub?gid=1701656193&single=true&output=csv';
    const WATCH_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQxEdO_NiXSTfy_96k0yL4rm-i9Ap3PwsIAzm4D3UlUVuntBqanNjChBCfB-ylKgWvYYI6kxIThfk-/pub?gid=2092358580&single=true&output=csv';
    const HIST_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQxEdO_NiXSTfy_96k0yL4rm-i9Ap3PwsIAzm4D3UlUVuntBqanNjChBCfB-ylKgWvYYI6kxIThfk-/pub?gid=292797368&single=true&output=csv';
    
    let sysFX = 32.33, myGChart = null, myPChart = null;

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        if(btn) btn.classList.add('active');
    }

    function clean(v) { 
        if(!v || v=="#N/A" || v.trim() === "") return 0; 
        return parseFloat(v.toString().replace(/[^0-9.-]+/g, "")) || 0; 
    }

    async function update() {
        try {
            document.getElementById('sync-info').innerText = "SYNCING...";
            const cb = `&t=${new Date().getTime()}`;
            const [pRes, wRes, hRes] = await Promise.all([
                fetch(PORT_CSV + cb).then(r => r.text()),
                fetch(WATCH_CSV + cb).then(r => r.text()),
                fetch(HIST_CSV + cb).then(r => r.text())
            ]);

            renderPort(pRes.split('\n').map(r => r.split(',')), hRes.split('\n').slice(1).map(r => r.split(',')).filter(r => r[0]));
            renderWatch(wRes.split('\n').map(r => r.split(',')));
            document.getElementById('sync-info').innerText = `READY: ${new Date().toLocaleTimeString()}`;
        } catch (e) { document.getElementById('sync-info').innerText = "OFFLINE"; }
    }

    function renderPort(rows, hRows) {
        const stockList = document.getElementById('stock-list'); stockList.innerHTML = '';
        const cashList = document.getElementById('cash-list'); cashList.innerHTML = '';
        
        // Locked Indexes (Portfolio)
        const fxVal = clean(rows[1][10]); // USD/THB at K2
        const cashVal = clean(rows[1][11]); // Cash at L2
        sysFX = fxVal || sysFX;

        let totalNW = cashVal, totalCost = 0, totalEqVal = 0, totalTgtVal = 0;
        let tickers = ['CASH'], values = [cashVal];

        cashList.innerHTML = `<div class="stock-row" style="grid-template-columns: 1fr 1fr 1.2fr"><b class="up">// CASH_BALANCE (L2)</b><b>$${cashVal.toLocaleString(undefined, {minimumFractionDigits:2})}</b><i style="color:var(--dim)">฿${(cashVal*sysFX).toLocaleString()}</i></div>`;

        rows.slice(1).forEach(r => {
            const t = r[0] ? r[0].trim() : "";
            const shares = clean(r[6]); // G
            if (!t || t === "Ticker (A)" || shares <= 0) return;

            const p = clean(r[3]); // D (Price Buffer)
            const c = clean(r[5]); // F (Avg Cost)
            const tgt = clean(r[8]); // I (Target)
            const mv = p * shares;
            const cb = c * shares;
            const plU = mv - cb;
            const plP = cb > 0 ? (plU/cb)*100 : 0;
            const prog = tgt > 0 ? Math.min((p/tgt)*100, 100) : 0;

            totalNW += mv; totalEqVal += mv; totalCost += cb; totalTgtVal += (tgt * shares);
            tickers.push(t); values.push(mv);

            stockList.innerHTML += `<div class="stock-row">
                <div><b class="up">${t}</b><br><i style="font-size:0.7rem;color:var(--dim)">${r[1]}</i></div>
                <div><b>${shares}</b></div><div>$${c.toFixed(2)}</div><div>$${p.toFixed(2)}</div>
                <div class="white">$${mv.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</div>
                <div class="${plU>=0?'up':'down'}"><b>$${Math.abs(plU).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</b></div>
                <div class="${plU>=0?'up':'down'}"><b>${plP.toFixed(1)}%</b></div>
                <div><div style="display:flex;justify-content:space-between;font-size:0.6rem"><span>TGT $${tgt}</span><span>${prog.toFixed(0)}%</span></div><div style="height:6px;background:#222;margin-top:8px"><div style="height:100%;background:var(--up);width:${prog}%"></div></div></div>
            </div>`;
        });

        document.getElementById('total-usd').innerText = `$${totalNW.toLocaleString(undefined,{maximumFractionDigits:0})}`;
        document.getElementById('total-thb').innerText = `฿${(totalNW*sysFX).toLocaleString(undefined,{maximumFractionDigits:0})}`;
        const totalPlPct = totalCost > 0 ? ((totalEqVal - totalCost) / totalCost) * 100 : 0;
        document.getElementById('total-pl').innerText = `${totalPlPct.toFixed(2)}%`;
        document.getElementById('total-pl').className = totalPlPct >= 0 ? 'up' : 'down';
        document.getElementById('fx-rate').innerText = sysFX.toFixed(3);
        drawCharts(totalNW, totalTgtVal, tickers, values, hRows);
    }

    function renderWatch(rows) {
        const grid = document.getElementById('watch-grid'); grid.innerHTML = '';
        rows.slice(1).filter(r => r[0] && r[0].trim() !== "").map(r => {
            const t = r[0].trim();
            const p = clean(r[4]); // E (Price X)
            const tgt = clean(r[5]); // F (Target)
            const gap = ((p - tgt) / tgt * 100);
            return { r, t, p, tgt, gap };
        }).sort((a, b) => a.gap - b.gap).forEach(item => {
            let clr = item.gap <= 5 ? 'up' : (item.gap <= 10 ? 'warn' : 'down');
            grid.innerHTML += `<div class="watch-card">
                <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:15px">
                    <b class="white" style="font-size:1.4rem;">${item.t} <span style="font-size:0.7rem;color:var(--dim)">${item.r[1]}</span></b>
                    <b class="white" style="font-size:1.4rem;">$${item.p.toFixed(2)}</b>
                </div>
                <div style="font-size:0.8rem;color:var(--dim);height:35px;overflow:hidden">${item.r[3]}</div>
                <div style="display:flex;justify-content:space-between;border-top:1px solid #222;padding-top:15px;margin-top:15px">
                    <div><span style="font-size:0.7rem;color:var(--dim)">GAP_%</span><br><b class="${clr}" style="font-size:1.1rem">${item.gap.toFixed(1)}%</b></div>
                    <div style="text-align:right"><span style="font-size:0.7rem;color:var(--dim)">TARGET</span><br><b class="up" style="font-size:1.1rem">$${item.tgt.toFixed(2)}</b></div>
                </div>
                <div style="font-size:0.75rem;color:var(--dim);margin-top:15px">${item.r[6]||'-'}</div>
                <a href="https://www.tradingview.com/chart/?symbol=${item.r[1]}:${item.t}" target="_blank" class="tv-btn">VIEW_CHART</a>
            </div>`;
        });
    }

    function drawCharts(curr, tgt, tickers, values, hRows) {
        if (myGChart) myGChart.destroy();
        myGChart = new Chart(document.getElementById('growthChart'), {
            type: 'line', data: { labels: hRows.map(r => r[0]).concat(['Now']), datasets: [
                { label: 'Target', data: Array(hRows.length + 1).fill(tgt), borderColor: '#00ff88', borderDash: [5,5], pointRadius: 0, fill: false },
                { label: 'Net Worth', data: hRows.map(r => clean(r[1])).concat([curr]), borderColor: '#00ff88', backgroundColor: 'rgba(0,255,136,0.1)', fill: true, pointRadius: 5 }
            ]}, options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#222' }, ticks: { color: '#aaa' } } } }
        });
        if (myPChart) myPChart.destroy();
        myPChart = new Chart(document.getElementById('pieChart'), {
            type: 'doughnut', data: { labels: tickers, datasets: [{ data: values, backgroundColor: ['#00e676', '#FFADAD', '#FFD6A5', '#FDFFB6', '#CAFFBF', '#9BF6FF', '#A0C4FF', '#BDB2FF', '#FFC6FF'], borderWidth: 0 }]},
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#eee', font: { size: 14 } } } }, cutout: '70%' }
        });
    }
    update(); setInterval(update, 60000);
</script>
</body>
</html>
